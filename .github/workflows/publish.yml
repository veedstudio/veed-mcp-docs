name: Publish skill

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: |
          mkdir -p ~/.skild
          echo '{"schemaVersion":1,"registryUrl":"https://registry.skild.sh","token":"'"$SKILD_TOKEN"'"}' > ~/.skild/registry-auth.json
          npx skild publish --dir skills/veed-mcp
        env:
          SKILD_TOKEN: ${{ secrets.SKILD_TOKEN }}
